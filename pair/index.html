<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join on UsTwo</title>
  <meta name="description" content="Someone invited you to pair on UsTwo.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrap" style="text-align:center; max-width:520px">
    <div class="brand" style="margin-bottom:36px">UsTwo<span class="dot">.</span></div>

    <p class="eyebrow">You're invited</p>
    <h1>Pair on UsTwo</h1>
    <p style="color:var(--mute); font-size:17px">
      Someone wants to leave little notes on your Home Screen.
      Open the invite in the app, or enter the couple code by hand.
    </p>

    <div class="card" id="codeCard" style="display:none; text-align:center">
      <p class="eyebrow" style="margin:0 0 6px">Couple code</p>
      <div class="hand" id="code" style="font-size:40px; letter-spacing:6px; color:var(--ink)"></div>
    </div>

    <p><a class="btn" id="openBtn" href="#">Open in UsTwo</a></p>
    <p style="margin-top:18px"><a id="appStore" href="https://apps.apple.com/app/ustwo" style="color:var(--mute)">Don't have UsTwo? Get it on the App Store →</a></p>

    <div class="footer">
      <a href="/">UsTwo</a> · <a href="/privacy/">Privacy</a> · <a href="/terms/">Terms</a>
    </div>
  </div>

  <script>
    // Pull ?code= and surface it + a custom-scheme deep link (works if the app is installed).
    var code = new URLSearchParams(location.search).get('code');
    if (code) {
      code = code.toUpperCase().replace(/[^A-Z0-9]/g, '');
      document.getElementById('code').textContent = code;
      document.getElementById('codeCard').style.display = 'block';
      document.getElementById('openBtn').href = 'ustwo://pair?code=' + code;
    } else {
      document.getElementById('openBtn').href = 'ustwo://pair';
    }
  </script>
</body>
</html>
